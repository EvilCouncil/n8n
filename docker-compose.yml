services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "5678:5678"
    volumes:
      - /srv/n8n-data:/home/node/.n8n
    environment:
      - N8N_HOST=n8n.evilcouncil.org
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - GENERIC_TIMEZONE=UTC
      - N8N_SECURE_COOKIE=true
    command: >
      sh -c "chmod -R 777 /home/node/.n8n 2>/dev/null; n8n start"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.rule=Host(`n8n.evilcouncil.org`)"
      - "traefik.http.routers.n8n.tls.certresolver=myresolver"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      - "wud.watch=true"
      - "wud.filter.image=n8nio/n8n"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy:
    external: true
